events {
    worker_connections 1024;
}

http {
    # Use Docker's built-in DNS resolver to prevent IP caching
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;
        
        # Route API requests to api-service
        location /api/ {
            # Using a variable forces Nginx to re-resolve the IP on every request
            set $api_upstream http://api-service:5000;
            proxy_pass $api_upstream;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route WebSocket requests to socket-service
        location /socket.io/ {
            # Using a variable forces Nginx to re-resolve the IP on every request
            set $socket_upstream http://socket-service:8001;
            proxy_pass $socket_upstream;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Catch-all for any other traffic
        location / {
            return 404;
        }
    }
}
